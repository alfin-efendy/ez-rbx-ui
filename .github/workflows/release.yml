name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # token: ${{ secrets.RELEASE_TOKEN }}   # aktifkan bila main diproteksi (lihat spec Bagian 9)

      - name: Install Lua + lua-bundler
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lua5.1
          sudo ln -sf /usr/bin/lua5.1 /usr/local/bin/lua
          curl -fsSL https://alfin-efendy.github.io/lua-bundler/install.sh | sudo bash
          lua-bundler --version

      - name: Build release bundle
        run: |
          mkdir -p release
          lua-bundler --entry ./main.lua --output ./release/ez-rbx-ui.lua --release --obfuscate 1

      - name: Build readable example + stress bundles
        run: make examples

      - name: Verify bundle syntax
        run: lua5.1 -e "assert(loadfile('./release/ez-rbx-ui.lua')); print('bundle syntax ok')"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Append "Try it" snippet to release notes
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(git tag --points-at HEAD | head -n1)"
          if [ -z "$TAG" ]; then echo "No new release tag on HEAD; skipping."; exit 0; fi
          BODY="$(gh release view "$TAG" --json body -q .body)"
          SNIPPET=$'\n\n---\n\n### Try it instantly\n\n**Demo playground**\n```lua\nloadstring(game:HttpGet("https://github.com/alfin-efendy/ez-rbx-ui/releases/latest/download/example.lua"))()\n```\n\n**Stress test**\n```lua\nloadstring(game:HttpGet("https://github.com/alfin-efendy/ez-rbx-ui/releases/latest/download/stress.lua"))()\n```'
          printf '%s%s' "$BODY" "$SNIPPET" | gh release edit "$TAG" --notes-file -
